name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx turbo lint

      - name: Build
        run: npx turbo build
        env:
          GIT_CLIENT_ID: ${{ secrets.GIT_CLIENT_ID }}
          GIT_CLIENT_SECRET: ${{ secrets.GIT_CLIENT_SECRET }}
          GITHUB_CLIENT_ID: ${{ secrets.GIT_CLIENT_ID || secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GIT_CLIENT_SECRET || secrets.GITHUB_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
