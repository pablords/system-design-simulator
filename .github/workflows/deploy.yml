name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'deploy'
  cancel-in-progress: true

jobs:
  build:
    name: Build All
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npx turbo build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          GIT_CLIENT_ID: ${{ secrets.GIT_CLIENT_ID }}
          GIT_CLIENT_SECRET: ${{ secrets.GIT_CLIENT_SECRET }}
          GITHUB_CLIENT_ID: ${{ secrets.GIT_CLIENT_ID || secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GIT_CLIENT_SECRET || secrets.GITHUB_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      # Deploy frontend to GitHub Pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./packages/web/dist

  deploy-pages:
    name: Deploy Frontend to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-api:
    name: Deploy API to Railway
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: system-design-simulator
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Sync Secrets & Deploy API to Railway
        run: |
          if [ -n "${{ secrets.GIT_CLIENT_ID }}" ]; then
            railway vars set \
              GIT_CLIENT_ID="${{ secrets.GIT_CLIENT_ID }}" \
              GIT_CLIENT_SECRET="${{ secrets.GIT_CLIENT_SECRET }}" \
              GITHUB_CLIENT_ID="${{ secrets.GIT_CLIENT_ID }}" \
              GITHUB_CLIENT_SECRET="${{ secrets.GIT_CLIENT_SECRET }}" \
              GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              --service "@system-design/api" || true
          fi
          railway up --service "@system-design/api" --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
